<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirro Skapeta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Playfair Display', serif;
      color: white;
      position: relative;
    }

    /* Yjet në sfond */
    .stars {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: transparent;
      z-index: 1;
    }

    /* Emri lart */
    .name {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.8rem;
      letter-spacing: 4px;
      text-align: center;
      z-index: 10;
      text-shadow: 0 0 30px rgba(255,255,255,0.6);
      white-space: nowrap;
    }

    /* UFO që lëviz */
    .ufo {
      position: absolute;
      font-size: 3.5rem;
      z-index: 5;
      animation: ufoFly 25s linear infinite;
      filter: drop-shadow(0 0 20px #00ffcc);
    }

    @keyframes ufoFly {
      0%   { transform: translate(-150px, 80vh) rotate(-15deg); }
      100% { transform: translate(120vw, -100px) rotate(15deg); }
    }

    /* Butonat poshtë */
    .buttons {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 35px;
      z-index: 10;
    }

    .btn {
      width: 68px;
      height: 68px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .btn:hover {
      transform: scale(1.15);
      background: rgba(255,255,255,0.25);
      border-color: #fff;
    }

    /* Yjet që lëvizin (shumë yje) */
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 4s infinite alternate;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <!-- Emri -->
  <h1 class="name">Pirro Skapeta</h1>

  <!-- UFO -->
  <div class="ufo">🛸</div>

  <!-- Butonat poshtë -->
  <div class="buttons">
    <div class="btn" onclick="window.open('https://instagram.com/pirro_skapeta', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://instagram.com/skapetaapartments', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://wa.me/355693227207', '_blank')">💬</div>
  </div>

  <script>
    // Krijo shumë yje
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 350; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        
        star.style.animationDelay = `-${Math.random() * 4}s`;
        star.style.opacity = Math.random() * 0.8 + 0.4;
        
        starsContainer.appendChild(star);
      }
    }

    createStars();
  </script>

</body>
</html>
