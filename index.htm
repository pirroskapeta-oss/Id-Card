<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirro Skapeta</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    overflow: hidden;
    color: white;
}

/* CANVAS DETI */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TEKSTI */
.container {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
}

h1 {
    font-size: 42px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(0,0,0,0.6);
}

p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

/* GUACKAT */
.shells {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.shell {
    width: 90px;
    height: 90px;
    border-radius: 50% 50% 40% 40%;
    background: radial-gradient(circle at top, #fff, #e0c3a3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.shell:hover {
    transform: scale(1.15) rotate(5deg);
}

.shell span {
    font-size: 12px;
    text-align: center;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<canvas id="ocean"></canvas>

<div class="container">
    <h1>Pirro Skapeta</h1>
    <p>+355 692033673</p>
    <p>Owner of Skapeta Apartments</p>
</div>

<div class="shells">
    <div class="shell" onclick="openLink('https://instagram.com/pirro_skapeta')">
        <span>Instagram<br>@pirro_skapeta</span>
    </div>

    <div class="shell" onclick="openLink('https://instagram.com/skapetaapartments')">
        <span>Business<br>@skapetaapartments</span>
    </div>

    <div class="shell" onclick="openLink('https://wa.me/355693227207')">
        <span>WhatsApp<br>0693227207</span>
    </div>
</div>

<script>
const canvas = document.getElementById("ocean");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let waves = [];

function createWave(strength = 1) {
    waves.push({
        x: Math.random() * canvas.width,
        y: canvas.height * 0.7,
        radius: 0,
        max: 200 * strength,
        alpha: 0.5
    });
}

/* Klikim ne det */
canvas.addEventListener("click", (e) => {
    waves.push({
        x: e.clientX,
        y: e.clientY,
        radius: 0,
        max: 150,
        alpha: 0.6
    });
});

/* Valë automatike çdo 5 sekonda */
setInterval(() => {
    createWave(1.5);
}, 5000);

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* gradient deti */
    let grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grd.addColorStop(0, "#1e90ff");
    grd.addColorStop(1, "#00bfff");

    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    waves.forEach((w, i) => {
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${w.alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        w.radius += 2;
        w.alpha -= 0.005;

        if (w.radius > w.max) {
            waves.splice(i, 1);
        }
    });

    requestAnimationFrame(animate);
}

animate();

function openLink(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
