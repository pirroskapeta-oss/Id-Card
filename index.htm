<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirro Skapeta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Playfair Display', serif;
      position: relative;
      color: white;
    }

    /* Yjet shumë të vegjël që lëvizin */
    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px white;
    }

    /* Emri lart majtas, më i vogël */
    .name {
      position: absolute;
      top: 12%;
      left: 8%;
      font-size: 2.1rem;
      letter-spacing: 3px;
      color: #ffffff;
      text-shadow: 
        0 0 8px #00ff9d,
        0 0 20px #00ff9d;
      z-index: 10;
    }

    /* Butonat rrumbullak me ngjyrë lart djathtas */
    .top-buttons {
      position: absolute;
      top: 12%;
      right: 8%;
      display: flex;
      gap: 16px;
      z-index: 10;
    }

    .btn {
      width: 52px;
      height: 52px;
      background: rgba(0, 255, 150, 0.12);
      border: 2px solid #00ff9d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #00ff9d;
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
      box-shadow: 0 0 15px rgba(0, 255, 150, 0.5);
    }

    .btn:hover {
      transform: scale(1.2);
      background: rgba(0, 255, 150, 0.25);
    }

    /* UFO me spirale */
    .ufo {
      position: absolute;
      font-size: 2.8rem;
      z-index: 5;
      filter: drop-shadow(0 0 20px #00ffcc);
      animation: ufoSpiral 32s linear infinite;
    }

    @keyframes ufoSpiral {
      0%   { transform: translate(-150px, 85vh) rotate(-25deg); }
      30%  { transform: translate(60px, 45vh) rotate(10deg); }
      60%  { transform: translate(170px, 25vh) rotate(-15deg); }
      100% { transform: translate(280px, -60px) rotate(20deg); }
    }

    /* Glob i botës poshtë (gjysmë Europë) */
    .globe {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 380px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Earth_from_space.jpg/800px-Earth_from_space.jpg') center/cover no-repeat;
      border-radius: 50%;
      box-shadow: 
        0 0 60px rgba(0, 180, 255, 0.4),
        inset 0 0 80px rgba(0,0,0,0.7);
      z-index: 2;
      opacity: 0.85;
    }

    .globe::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.15), transparent 70%);
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <!-- Emri lart majtas -->
  <h1 class="name">Pirro Skapeta</h1>

  <!-- Butonat lart djathtas -->
  <div class="top-buttons">
    <div class="btn" onclick="window.open('https://instagram.com/pirro_skapeta', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://instagram.com/skapetaapartments', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://wa.me/355693227207', '_blank')">💬</div>
  </div>

  <!-- UFO -->
  <div class="ufo">🛸</div>

  <!-- Glob poshtë -->
  <div class="globe"></div>

  <script>
    // Krijo shumë yje të vegjël që lëvizin
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 650; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        
        const size = Math.random() * 2.2 + 0.6;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        
        const duration = Math.random() * 45 + 28;
        star.style.animation = `moveStar ${duration}s linear infinite`;
        
        star.style.opacity = Math.random() * 0.75 + 0.35;
        
        container.appendChild(star);
      }
    }

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes moveStar {
        from { transform: translate(0, 0); }
        to   { transform: translate(140vw, -140vh); }
      }
    `;
    document.head.appendChild(style);

    createStars();
  </script>

</body>
</html>
