<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirro Skapeta</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow:hidden;
color:white;
}

/* VIDEO BACKGROUND */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.85) contrast(1.1) saturate(1.2);
}

/* OVERLAY */
.overlay-bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,0.7),
rgba(0,0,0,0.2),
rgba(0,0,0,0.7)
);
z-index:-1;
}

/* TEXT */
.container{
position:absolute;
top:15%;
width:100%;
text-align:center;
}

h1{
font-size:50px;
letter-spacing:2px;
text-shadow:0 0 20px black;
}

p{
font-size:18px;
opacity:0.9;
}

/* SHELL BUTTONS */
.shells{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:30px;
}

.shell{
width:100px;
height:100px;
border-radius:60% 60% 40% 40%;
background:radial-gradient(circle at top,#fff,#caa27c);
box-shadow:
inset 0 5px 10px rgba(255,255,255,0.6),
0 15px 30px rgba(0,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.shell:hover{
transform:scale(1.2) rotate(6deg);
}

.shell span{
font-size:12px;
color:black;
font-weight:bold;
text-align:center;
}

/* RIPPLE EFFECT */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.4);
transform:scale(0);
animation:ripple 1s linear;
}

@keyframes ripple{
to{
transform:scale(6);
opacity:0;
}
}
</style>
</head>

<body>

<!-- REAL VIDEO ONLINE -->
<video autoplay muted loop playsinline>
<source src="https://videos.pexels.com/video-files/3195394/3195394-hd_1080_1920_25fps.mp4" type="video/mp4">
</video>

<div class="overlay-bg"></div>

<div class="container">
<h1>Pirro Skapeta</h1>
<p>+355 692033673</p>
<p>Owner of Skapeta Apartments</p>
</div>

<div class="shells">
<div class="shell" onclick="openLink('https://instagram.com/pirro_skapeta')">
<span>@pirro_skapeta</span>
</div>

<div class="shell" onclick="openLink('https://instagram.com/skapetaapartments')">
<span>@skapetaapartments</span>
</div>

<div class="shell" onclick="openLink('https://wa.me/355693227207')">
<span>WhatsApp</span>
</div>
</div>

<script>
document.addEventListener("click", function(e){
let ripple=document.createElement("div");
ripple.className="ripple";
ripple.style.left=e.clientX+"px";
ripple.style.top=e.clientY+"px";
ripple.style.width=ripple.style.height="20px";
document.body.appendChild(ripple);
setTimeout(()=>ripple.remove(),1000);
});

function openLink(url){
window.open(url,"_blank");
}
</script>

</body>
</html>
