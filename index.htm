<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirro Skapeta</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* UI mbi 3D */
.overlay {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    z-index: 10;
}

.overlay h1 {
    font-size: 45px;
    text-shadow: 0 0 20px black;
}

.overlay p {
    font-size: 18px;
}

/* GUACKA */
.shells {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
    z-index: 10;
}

.shell {
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, #fff, #d2a679);
    border-radius: 50% 50% 40% 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.shell:hover {
    transform: scale(1.2) rotate(8deg);
}

.shell span {
    color: black;
    font-size: 12px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">
    <h1>Pirro Skapeta</h1>
    <p>+355 692033673</p>
    <p>Owner of Skapeta Apartments</p>
</div>

<div class="shells">
    <div class="shell" onclick="openLink('https://instagram.com/pirro_skapeta')">
        <span>Instagram<br>@pirro_skapeta</span>
    </div>

    <div class="shell" onclick="openLink('https://instagram.com/skapetaapartments')">
        <span>Business<br>@skapetaapartments</span>
    </div>

    <div class="shell" onclick="openLink('https://wa.me/355693227207')">
        <span>WhatsApp<br>0693227207</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, water;

init();
animate();

function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    /* DRITA */
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(0, 10, 10);
    scene.add(light);

    /* DETI */
    const geometry = new THREE.PlaneGeometry(50, 50, 256, 256);
    const material = new THREE.MeshPhongMaterial({
        color: 0x1e90ff,
        shininess: 100,
        transparent: true,
        opacity: 0.9
    });

    water = new THREE.Mesh(geometry, material);
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    window.addEventListener("resize", onResize);
    window.addEventListener("click", waveClick);
}

/* VALË NATYRALE */
function animateWaves(time) {
    const pos = water.geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let y = pos.getY(i);

        let wave =
            Math.sin(x * 0.3 + time * 1.5) * 0.3 +
            Math.cos(y * 0.5 + time) * 0.2;

        pos.setZ(i, wave);
    }

    pos.needsUpdate = true;
}

/* KLIK → VALË */
function waveClick(event) {
    let mouseX = (event.clientX / window.innerWidth) * 2 - 1;
    let mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

    const pos = water.geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let y = pos.getY(i);

        let dist = Math.sqrt((x - mouseX*10)**2 + (y - mouseY*10)**2);

        if (dist < 2) {
            pos.setZ(i, 1);
        }
    }
}

/* VALË E MADHE ÇDO 5 SEK */
setInterval(() => {
    const pos = water.geometry.attributes.position;

    for (let i = 0; i < pos.count; i++) {
        pos.setZ(i, Math.random() * 1);
    }
}, 5000);

function animate(time) {
    requestAnimationFrame(animate);

    animateWaves(time * 0.001);

    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function openLink(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
