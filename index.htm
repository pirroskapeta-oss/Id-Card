<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirro Skapeta | Luxury ID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        #view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .ui-overlay {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .header {
            text-align: center;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease;
        }

        .header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }
        .header p { margin: 5px 0; font-weight: 300; opacity: 0.9; }

        .button-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 20px;
            pointer-events: auto;
        }

        .shell-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-decoration: none;
            color: #4a3728;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 -5px 10px rgba(0,0,0,0.1);
            background: linear-gradient(145deg, #fffcf5, #e6dcc5);
            border: 1px solid #d4c8ac;
        }

        /* Format e Guackave të Detit */
        .shell-1 { border-radius: 50% 50% 40% 40% / 80% 80% 20% 20%; }
        .shell-2 { border-radius: 30% 70% 40% 60% / 50% 30% 70% 50%; transform: rotate(2deg); }
        .shell-3 { border-radius: 60% 40% 70% 30% / 30% 60% 40% 70%; transform: rotate(-1deg); }

        .shell-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .shell-btn:hover { background: #ffffff; filter: brightness(1.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="view"></canvas>

    <div class="ui-overlay">
        <div class="header">
            <h1>Pirro Skapeta</h1>
            <p>Skapeta Apartments Owner</p>
        </div>

        <div class="button-container">
            <a href="https://www.instagram.com/pirro_skapeta/" target="_blank" class="shell-btn shell-1">
                Personal: @pirro_skapeta
            </a>
            <a href="https://www.instagram.com/skapetaapartments/" target="_blank" class="shell-btn shell-2">
                Business: @skapetaapartments
            </a>
            <a href="https://wa.me/355693227207" target="_blank" class="shell-btn shell-3">
                WhatsApp: +355 69 322 7207
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.querySelector('#view');
        const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
        renderer.setPixelRatio(window.devicePixelRatio);
        
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec2 uMouse;
            uniform float uRipple;

            // Simple noise for water/sand
            float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
            float noise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                vec2 u = f*f*(3.0-2.0*f);
                return mix(mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), u.x),
                           mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / uResolution.xy;
                
                // Colors
                vec3 sand = vec3(0.9, 0.8, 0.6) + noise(uv * 100.0) * 0.05;
                vec3 water = vec3(0.0, 0.4, 0.5);
                
                // Dynamic Shoreline
                float shore = 0.5 + sin(uv.x * 3.0 + uTime * 0.5) * 0.05;
                
                // Big Wave every 5 seconds
                float waveCycle = mod(uTime, 5.0);
                float waveFront = smoothstep(0.0, 1.0, waveCycle / 2.0) * 0.8;
                shore -= smoothstep(waveFront - 0.1, waveFront, uv.y) * 0.1 * smoothstep(waveFront + 0.1, waveFront, uv.y);

                // Water Interaction (Ripples)
                float dist = distance(uv, uMouse);
                float ripple = sin(dist * 40.0 - uTime * 5.0) * 0.02 * smoothstep(0.3, 0.0, dist);
                
                float mask = smoothstep(shore - 0.05, shore + 0.05, uv.y + ripple);
                
                // Water depth effect
                vec3 waterCol = mix(vec3(0.1, 0.6, 0.7), vec3(0.0, 0.2, 0.4), uv.y);
                
                // Foam line
                float foam = smoothstep(0.02, 0.0, abs(uv.y - shore)) * 0.2;
                
                vec3 finalCol = mix(sand, waterCol + foam, mask);
                
                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        const geometry = new THREE.PlaneGeometry(2, 2);
        const uniforms = {
            uTime: { value: 0 },
            uResolution: { value: new THREE.Vector2() },
            uMouse: { value: new THREE.Vector2(-1, -1) }
        };

        const material = new THREE.ShaderMaterial({
            uniforms,
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
            fragmentShader
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function resize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', resize);
        resize();

        // Mouse/Touch Interaction
        const handleMove = (e) => {
            const x = (e.touches ? e.touches[0].clientX : e.clientX) / window.innerWidth;
            const y = 1.0 - (e.touches ? e.touches[0].clientY : e.clientY) / window.innerHeight;
            uniforms.uMouse.value.set(x, y);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchstart', handleMove);

        function animate(t) {
            uniforms.uTime.value = t / 1000;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
