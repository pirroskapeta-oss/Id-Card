<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1a2e">
<title>Pirro Skapeta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0d2235; touch-action: none; font-family: 'Montserrat', sans-serif; }
#ocean-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
#profile-card { position: fixed; top: 0; left: 0; width: 100%; padding-top: max(6vh, 32px); display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
.profile-name { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 8vw, 4rem); font-weight: 800; color: #ffffff; letter-spacing: 0.04em; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.55), 0 0 40px rgba(255,200,100,0.18); }
.profile-phone { font-family: 'Lato', sans-serif; font-size: clamp(0.8rem, 2.2vw, 1rem); font-weight: 300; color: rgba(255,255,255,0.92); letter-spacing: 0.12em; margin-top: 0.55em; text-shadow: 0 1px 8px rgba(0,0,0,0.7); }
.profile-subtitle { font-family: 'Lato', sans-serif; font-size: clamp(0.72rem, 1.9vw, 0.9rem); font-weight: 300; color: rgba(255,245,220,0.82); letter-spacing: 0.1em; margin-top: 0.28em; text-shadow: 0 1px 8px rgba(0,0,0,0.7); }
#buttons-container { position: fixed; bottom: 0; left: 0; width: 100%; padding-bottom: max(3.5vh, 20px); display: flex; align-items: flex-end; justify-content: center; gap: clamp(12px, 5vw, 38px); z-index: 20; }
.btn-link { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-link:hover { transform: translateY(-8px) scale(1.06); }
.btn-link:active { transform: translateY(-3px) scale(1.02); }
.btn-circle { width: clamp(72px, 17vw, 105px); height: clamp(72px, 17vw, 105px); border-radius: 50%; background: rgba(0,0,0,0.72); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.13); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08); transition: background 0.3s, box-shadow 0.3s; }
.btn-link:hover .btn-circle { background: rgba(10,10,10,0.82); box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12); }
.btn-icon { width: clamp(22px, 5.5vw, 32px); height: clamp(22px, 5.5vw, 32px); opacity: 0.92; }
.btn-label { font-family: 'Lato', sans-serif; font-size: clamp(0.52rem, 1.35vw, 0.64rem); font-weight: 400; color: rgba(255,255,255,0.82); letter-spacing: 0.02em; text-align: center; line-height: 1.2; max-width: 80px; }
#touch-hint { position: fixed; bottom: max(29vh, 180px); left: 50%; transform: translateX(-50%); font-family: 'Lato', sans-serif; font-size: clamp(0.52rem, 1.3vw, 0.65rem); color: rgba(255,255,255,0.28); letter-spacing: 0.45em; text-transform: uppercase; pointer-events: none; z-index: 5; animation: hintPulse 7s ease-in-out infinite; white-space: nowrap; }
@keyframes hintPulse { 0%,100%{opacity:0;} 40%,60%{opacity:1;} }
#loading { position: fixed; inset: 0; background: #0d2235; display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 1.2s ease; }
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-text { font-family: 'Lato', sans-serif; font-size: 0.78rem; color: rgba(180,230,255,0.55); letter-spacing: 0.5em; text-transform: uppercase; animation: ldPulse 1.5s ease-in-out infinite; }
@keyframes ldPulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
</style>
</head>
<body>

<div id="loading"><span class="loading-text">Duke u ngarkuar</span></div>
<canvas id="ocean-canvas"></canvas>

<div id="profile-card">
  <div class="profile-name">Pirro Skapeta</div>
  <div class="profile-phone">+355 692 033 673</div>
  <div class="profile-subtitle">Owner of Skapeta Apartments</div>
</div>

<div id="touch-hint">Prek detin</div>

<div id="buttons-container">

  <a href="https://instagram.com/pirro_skapeta" target="_blank" rel="noopener" class="btn-link">
    <div class="btn-circle">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="5" stroke="white" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
      </svg>
      <span class="btn-label">@pirro_skapeta</span>
    </div>
  </a>

  <a href="https://instagram.com/skapetaapartments" target="_blank" rel="noopener" class="btn-link">
    <div class="btn-circle">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="5" stroke="white" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
      </svg>
      <span class="btn-label">@skapeta apartments</span>
    </div>
  </a>

  <a href="https://wa.me/355693227207" target="_blank" rel="noopener" class="btn-link">
    <div class="btn-circle">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.8"/>
        <path d="M7.5,15.5 C8.5,13.5 10,11.5 12,10.5 C14,9.5 16,10 16.5,12 C17,14 15.5,16 13.5,16.5 C12.5,16.8 11,16.5 10,15.8 L7,17 L7.8,14 C7.5,14.5 7.2,15 7.5,15.5 Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="btn-label">WhatsApp</span>
    </div>
  </a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function () {
  'use strict';
  var canvas = document.getElementById('ocean-canvas');
  var W = window.innerWidth, H = window.innerHeight;
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1e30);
  var camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 800);
  camera.position.set(0, 18, 52);
  camera.lookAt(0, -1, 0);

  var skyU = { uTime: { value: 0.0 } };
  var skyMat = new THREE.ShaderMaterial({
    uniforms: skyU,
    vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: [
      'uniform float uTime;',
      'varying vec2 vUv;',
      'float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }',
      'float noise(vec2 p){',
      '  vec2 i=floor(p), f=fract(p);',
      '  f=f*f*(3.0-2.0*f);',
      '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
      '}',
      'void main(){',
      '  float y = vUv.y;',
      '  vec3 horizon = vec3(0.95, 0.52, 0.14);',
      '  vec3 sky_mid  = vec3(0.38, 0.22, 0.52);',
      '  vec3 sky_top  = vec3(0.06, 0.09, 0.22);',
      '  vec3 col = mix(horizon, sky_mid, smoothstep(0.0, 0.42, y));',
      '  col = mix(col, sky_top, smoothstep(0.35, 1.0, y));',
      '  float sx = abs(vUv.x - 0.62)*2.0;',
      '  float sunGlow = exp(-sx*sx*4.5) * exp(-y*y*18.0);',
      '  col += sunGlow * vec3(1.0, 0.85, 0.3) * 0.85;',
      '  float cloudY = smoothstep(0.08, 0.55, y);',
      '  float t = uTime * 0.012;',
      '  float c1 = noise(vec2(vUv.x*3.2 + t, y*4.5 + 0.8));',
      '  float c2 = noise(vec2(vUv.x*5.5 - t*0.7, y*6.0 + 1.5));',
      '  float cloud = smoothstep(0.52, 0.78, c1*0.6+c2*0.4) * cloudY;',
      '  vec3 cloudC = mix(vec3(1.0,0.70,0.35), vec3(0.95,0.88,0.80), y);',
      '  col = mix(col, cloudC, cloud * 0.72);',
      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n'),
    depthWrite: false,
    side: THREE.BackSide,
  });
  var skyDome = new THREE.Mesh(new THREE.SphereGeometry(380, 32, 16), skyMat);
  skyDome.renderOrder = -1;
  scene.add(skyDome);

  var sunMesh = new THREE.Mesh(new THREE.CircleGeometry(7, 40), new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.96 }));
  sunMesh.position.set(62, 28, -180); scene.add(sunMesh);
  var h1 = new THREE.Mesh(new THREE.CircleGeometry(16, 40), new THREE.MeshBasicMaterial({ color: 0xffaa22, transparent: true, opacity: 0.13 }));
  h1.position.set(62, 28, -181); scene.add(h1);
  var h2 = new THREE.Mesh(new THREE.CircleGeometry(28, 40), new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.06 }));
  h2.position.set(62, 28, -182); scene.add(h2);

  var MAX_R = 12;
  var ripVec = [];
  for (var ri = 0; ri < MAX_R; ri++) ripVec.push(new THREE.Vector3(0, 0, -9999));
  var ripHead = 0;
  var wUni = { uTime: { value: 0.0 }, uRipple: { value: ripVec }, uRippleCount: { value: 0 } };

  var WVERT = [
    'uniform float uTime;',
    'uniform vec3 uRipple[' + MAX_R + '];',
    'uniform int uRippleCount;',
    'varying vec3 vPos; varying float vH; varying vec3 vNorm;',
    'float wave(vec2 p,float kx,float kz,float amp,float spd,float ph){ return amp*sin(p.x*kx+p.y*kz+uTime*spd+ph); }',
    'float calcH(vec2 p){',
    '  float h=0.0;',
    '  h+=wave(p, 0.048, 0.032,2.20,0.50,0.0);',
    '  h+=wave(p,-0.035, 0.058,1.80,0.44,1.9);',
    '  h+=wave(p, 0.044,-0.044,1.50,0.36,3.7);',
    '  h+=wave(p, 0.150, 0.068,0.72,1.05,0.0);',
    '  h+=wave(p,-0.090, 0.140,0.58,0.90,2.2);',
    '  h+=wave(p, 0.110,-0.105,0.50,0.80,1.4);',
    '  h+=wave(p, 0.380, 0.170,0.22,2.10,0.0);',
    '  h+=wave(p,-0.260, 0.340,0.16,2.40,1.6);',
    '  h+=wave(p, 0.300,-0.300,0.14,1.85,3.3);',
    '  return h;',
    '}',
    'void main(){',
    '  vec3 pos=position; vec2 p=pos.xz; float h=calcH(p);',
    '  float phase=mod(uTime*0.2,1.0);',
    '  float wZ=mix(-80.0,40.0,phase);',
    '  float dist=pos.z-wZ;',
    '  float shoal=1.0+smoothstep(-80.0,40.0,wZ)*1.8;',
    '  float env=exp(-max(dist,0.0)*0.10)*exp(-max(-dist,0.0)*0.035);',
    '  float fade=smoothstep(0.0,0.06,phase)*smoothstep(1.0,0.94,phase);',
    '  h+=env*6.5*shoal*fade;',
    '  for(int i=0;i<' + MAX_R + ';i++){',
    '    if(i>=uRippleCount) break;',
    '    float age=uTime-uRipple[i].z;',
    '    if(age>=0.0&&age<=7.0){',
    '      float dx=pos.x-uRipple[i].x,dz=pos.z-uRipple[i].y;',
    '      float d=sqrt(dx*dx+dz*dz);',
    '      float wf=d-age*7.5;',
    '      float amp=exp(-age*0.62)*2.1;',
    '      h+=sin(wf*-1.1)*amp*exp(-wf*wf*0.35);',
    '    }',
    '  }',
    '  pos.y=h; vPos=pos; vH=h;',
    '  float e=0.65;',
    '  vNorm=normalize(vec3(h-calcH(p+vec2(e,0.0)),e,h-calcH(p+vec2(0.0,e))));',
    '  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);',
    '}'
  ].join('\n');

  var WFRAG = [
    'uniform float uTime;',
    'varying vec3 vPos; varying float vH; varying vec3 vNorm;',
    'void main(){',
    '  vec3 deep=vec3(0.012,0.145,0.245);',
    '  vec3 mid=vec3(0.035,0.390,0.480);',
    '  vec3 shall=vec3(0.100,0.620,0.660);',
    '  vec3 foam=vec3(0.870,0.950,0.980);',
    '  float hN=clamp((vH+2.0)/6.0,0.0,1.0);',
    '  vec3 col=mix(deep,mid,hN);',
    '  col=mix(col,shall,smoothstep(1.6,3.0,vH)*0.68);',
    '  col=mix(col,foam,smoothstep(2.8,5.6,vH)*0.90);',
    '  vec3 sunDir=normalize(vec3(62.0,28.0,-180.0)-vPos);',
    '  vec3 vDir=normalize(vec3(0.0,18.0,52.0)-vPos);',
    '  vec3 hv=normalize(sunDir+vDir);',
    '  float spec=pow(max(dot(vNorm,hv),0.0),90.0);',
    '  col+=spec*vec3(1.0,0.80,0.30)*1.6;',
    '  float rx=abs(vPos.x-62.0*(1.0-vPos.z/55.0)*0.18);',
    '  col+=exp(-rx*rx*0.06)*exp(-abs(vPos.z+5.0)*0.012)*vec3(1.0,0.75,0.25)*0.38;',
    '  float sp=fract(sin(dot(floor(vPos.xz*4.5),vec2(127.1,311.7)))*43758.5);',
    '  float sp2=fract(sin(dot(floor(vPos.xz*4.5+1.0),vec2(269.5,183.3)))*43758.5);',
    '  col+=step(0.975,sp)*step(0.5,sp2)*0.85*step(0.4,hN);',
    '  gl_FragColor=vec4(col,0.92+smoothstep(2.8,5.6,vH)*0.08);',
    '}'
  ].join('\n');

  var wGeo = new THREE.PlaneGeometry(280, 200, 300, 260);
  wGeo.rotateX(-Math.PI / 2);
  scene.add(new THREE.Mesh(wGeo, new THREE.ShaderMaterial({ uniforms: wUni, vertexShader: WVERT, fragmentShader: WFRAG, transparent: true })));

  var sGeo = new THREE.PlaneGeometry(280, 60, 100, 24);
  sGeo.rotateX(-Math.PI / 2);
  var sPA = sGeo.attributes.position;
  for (var si = 0; si < sPA.count; si++) {
    sPA.setY(si, -0.55 + Math.sin(sPA.getX(si)*0.18)*0.08 + Math.cos(sPA.getZ(si)*0.32)*0.06);
  }
  sPA.needsUpdate = true; sGeo.computeVertexNormals();
  var sandU = { uTime: { value: 0.0 } };
  var sandMesh = new THREE.Mesh(sGeo, new THREE.ShaderMaterial({
    uniforms: sandU,
    vertexShader: 'varying vec2 vUv; varying vec3 vW; void main(){ vUv=uv; vW=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: [
      'uniform float uTime; varying vec2 vUv; varying vec3 vW;',
      'float h2(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }',
      'void main(){',
      '  float n=h2(floor(vW.xz*4.5)),n2=h2(floor(vW.xz*1.6));',
      '  vec3 dry=vec3(0.90,0.78,0.52),dry2=vec3(0.82,0.70,0.44),wet=vec3(0.55,0.48,0.30);',
      '  float w=smoothstep(0.50,0.0,vUv.x);',
      '  float wash=smoothstep(0.22,0.28,vUv.x)*(0.5+0.5*sin(uTime*0.7+vW.x*0.25));',
      '  vec3 col=mix(dry2,dry,n*0.5+n2*0.5);',
      '  col=mix(col,wet,w*0.82);',
      '  col+=wash*0.08*vec3(0.7,0.88,1.0);',
      '  col+=step(0.988,h2(vW.xz*2.5))*w*0.22*vec3(1.0,0.95,0.80);',
      '  gl_FragColor=vec4(col,1.0);',
      '}'
    ].join('\n')
  }));
  sandMesh.position.set(0, 0, 60);
  scene.add(sandMesh);

  var PC = 320;
  var pGeo = new THREE.BufferGeometry();
  var pArr = new Float32Array(PC*3), pVel = new Float32Array(PC*2);
  for (var pi=0;pi<PC;pi++){
    pArr[pi*3]=(Math.random()-0.5)*260; pArr[pi*3+1]=Math.random()*3.5; pArr[pi*3+2]=(Math.random()-0.45)*160;
    pVel[pi*2]=(Math.random()-0.5)*0.25; pVel[pi*2+1]=(Math.random()-0.5)*0.15;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pArr,3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0xeef8ff, size:0.18, transparent:true, opacity:0.28, sizeAttenuation:true })));

  scene.add(new THREE.AmbientLight(0xffa040, 2.8));
  var sunLight = new THREE.DirectionalLight(0xffe0a0, 3.2);
  sunLight.position.set(62, 40, -80); scene.add(sunLight);

  var hitPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
  var raycaster = new THREE.Raycaster();
  var mV = new THREE.Vector2();
  function spawnRipple(cx,cy){
    if(cy>window.innerHeight*0.76) return;
    mV.x=(cx/window.innerWidth)*2-1; mV.y=-(cy/window.innerHeight)*2+1;
    raycaster.setFromCamera(mV,camera);
    var hit=new THREE.Vector3();
    if(raycaster.ray.intersectPlane(hitPlane,hit)){
      var idx=ripHead%MAX_R;
      ripVec[idx].set(hit.x,hit.z,wUni.uTime.value);
      ripHead++; wUni.uRippleCount.value=Math.min(ripHead,MAX_R);
    }
  }
  canvas.addEventListener('mousedown',function(e){ spawnRipple(e.clientX,e.clientY); });
  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();
    for(var t=0;t<e.touches.length;t++) spawnRipple(e.touches[t].clientX,e.touches[t].clientY);
  },{passive:false});

  window.addEventListener('resize',function(){
    W=window.innerWidth; H=window.innerHeight;
    renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
  });

  var startT=null, prevT=0;
  function tick(now){
    requestAnimationFrame(tick);
    if(!startT) startT=now;
    var t=(now-startT)*0.001, dt=Math.min(t-prevT,0.05); prevT=t;
    wUni.uTime.value=t; skyU.uTime.value=t; sandU.uTime.value=t;
    camera.position.x=Math.sin(t*0.065)*2.2;
    camera.position.y=18+Math.sin(t*0.095)*0.55;
    camera.lookAt(Math.sin(t*0.05)*1.4,-1,0);
    var pA=pGeo.attributes.position.array;
    for(var i=0;i<PC;i++){
      pA[i*3]+=dt*pVel[i*2]*0.7; pA[i*3+1]+=dt*0.20; pA[i*3+2]+=dt*0.12;
      if(pA[i*3+1]>4.5||pA[i*3+2]>55){
        pA[i*3]=(Math.random()-0.5)*260; pA[i*3+1]=0; pA[i*3+2]=-80+Math.random()*25;
      }
    }
    pGeo.attributes.position.needsUpdate=true;
    renderer.render(scene,camera);
  }
  requestAnimationFrame(tick);

  function hideLoader(){
    var l=document.getElementById('loading');
    if(l){l.classList.add('hidden');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},1300);}
  }
  window.addEventListener('load',function(){setTimeout(hideLoader,600);});
  setTimeout(hideLoader,2500);
})();
</script>
</body>
</html>
