<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirro Skapeta | Skapeta Apartments</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #d4bda4; font-family: 'Inter', -apple-system, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Overlay moderne dhe elitare */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        .header { text-align: center; color: white; text-shadow: 0 2px 15px rgba(0,0,0,0.3); }
        .header h1 { margin: 0; font-size: 26px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
        .header p { margin: 5px 0; font-size: 14px; letter-spacing: 1px; opacity: 0.8; text-transform: uppercase; }

        .links-area {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            margin-bottom: 20px;
        }

        /* Guackat - Dizajn minimalist "Glass" që nuk mbulon rërën reale */
        .guacka-btn {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2c3e50;
            padding: 20px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.3s all ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Forma unike guackash */
        .g1 { border-radius: 65% 35% 50% 50% / 40% 40% 60% 60%; }
        .g2 { border-radius: 35% 65% 60% 40% / 50% 50% 50% 50%; transform: rotate(1deg); }
        .g3 { border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; transform: rotate(-1deg); }

        .guacka-btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>

    <div class="overlay">
        <div class="header">
            <h1>Pirro Skapeta</h1>
            <p>Skapeta Apartments</p>
        </div>

        <div class="links-area">
            <a href="https://www.instagram.com/pirro_skapeta/" target="_blank" class="guacka-btn g1">@pirro_skapeta</a>
            <a href="https://www.instagram.com/skapetaapartments/" target="_blank" class="guacka-btn g2">@skapetaapartments</a>
            <a href="https://wa.me/355693227207" target="_blank" class="guacka-btn g3">WhatsApp: 069 322 7207</a>
        </div>
    </div>

    <div id="beach-bg" style="width: 100%; height: 100vh; background-size: cover; background-position: center;"></div>

    <script>
        $(document).ready(function() {
            try {
                $('#beach-bg').ripples({
                    imageUrl: 'f14f1baab6526414e64ccb137f95e974.jpg', // Fotoja jote origjinale
                    dropRadius: 20,
                    perturbance: 0.02,
                    resolution: 512,
                    interactive: true
                });

                // Efekti i dallgës automatike çdo 5 sekonda
                setInterval(function() {
                    var x = Math.random() * $('#beach-bg').width();
                    var y = Math.random() * ($('#beach-bg').height() * 0.5); // Vetëm te pjesa e ujit
                    $('#beach-bg').ripples('drop', x, y, 30, 0.04);
                }, 5000);

            } catch (e) {
                console.error("Browser-i nuk mbështet WebGL për efektin e ujit.");
                $('#beach-bg').css('background-image', 'url(f14f1baab6526414e64ccb137f95e974.jpg)');
            }
        });
    </script>
</body>
</html>
