<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirro Skapeta | Skapeta Apartments</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0a2a3f;
    }

    .background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
      filter: brightness(0.92) contrast(1.05);
      z-index: -2;
      animation: slowWave 40s linear infinite;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0,40,70,0.25), rgba(0,20,50,0.45));
      z-index: -1;
    }

    .container {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 20px 30px;
      z-index: 2;
    }

    .top-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(22px);
      border-radius: 26px;
      padding: 38px 25px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.25);
      max-width: 420px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 2.85rem;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.5);
      margin-bottom: 10px;
    }

    .title { font-size: 1.15rem; color: rgba(255,255,255,0.95); margin-bottom: 8px; }
    .phone { font-size: 1.2rem; color: rgba(255,255,255,0.9); font-weight: 500; }

    .bottom-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 20px 15px;
      max-width: 360px;
      margin: 0 auto 20px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 35px rgba(0,0,0,0.3);
    }

    .shells {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .shell {
      text-align: center;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .shell img {
      width: 62px;
      height: 62px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
      transition: all 0.4s ease;
    }

    .shell:hover img {
      transform: scale(1.18) rotate(10deg);
    }

    .shell p {
      color: #fff;
      font-size: 0.82rem;
      margin-top: 6px;
      font-weight: 500;
    }

    @keyframes slowWave {
      0%   { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @media (max-width: 480px) {
      .name { font-size: 2.4rem; }
      .top-card { padding: 30px 18px; }
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="container">
    <!-- Top - Emri lart me blur të fortë -->
    <div class="top-card">
      <h1 class="name">Pirro Skapeta</h1>
      <p class="title">Pronar i Skapeta Apartments</p>
      <p class="phone">+355 69 203 3673</p>
    </div>

    <!-- Bottom - Guaskat më të vogla -->
    <div class="bottom-card">
      <div class="shells">
        <div class="shell" onclick="window.open('https://instagram.com/pirro_skapeta', '_blank')">
          <img src="https://i.ibb.co/0jZfK8P/seashell1.png" alt="Instagram Personal">
          <p>@pirro_skapeta</p>
        </div>
        <div class="shell" onclick="window.open('https://instagram.com/skapetaapartments', '_blank')">
          <img src="https://i.ibb.co/8vL9kLm/seashell2.png" alt="Instagram Business">
          <p>@skapetaapartments</p>
        </div>
        <div class="shell" onclick="window.open('https://wa.me/355693227207', '_blank')">
          <img src="https://i.ibb.co/5zqK9pN/seashell3.png" alt="WhatsApp">
          <p>069 322 7207</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
