<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skapeta Apartments | Elite ID</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', -apple-system, sans-serif; }
        #canvas-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Overlay */
        .interface {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .header-brand {
            text-align: center;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .header-brand h1 { margin: 0; font-size: 26px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .header-brand div { width: 40px; height: 1px; background: #fff; margin: 15px auto; opacity: 0.6; }
        .header-brand p { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 290px;
            pointer-events: auto;
        }

        /* Guackat Elitare - Dizajn Realist */
        .shell-item {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Formë unike guackash organike */
        .s1 { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
        .s2 { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; transform: translateX(5px); }
        .s3 { border-radius: 50% 50% 10% 10% / 60% 60% 40% 40%; transform: translateX(-5px); }

        .shell-item:hover { transform: scale(1.05) translateY(-5px); background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .shell-item:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="canvas-wrapper"></div>

<div class="interface">
    <div class="header-brand">
        <h1>Pirro Skapeta</h1>
        <div></div>
        <p>Skapeta Apartments</p>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/pirro_skapeta/" target="_blank" class="shell-item s1">@pirro_skapeta</a>
        <a href="https://www.instagram.com/skapetaapartments/" target="_blank" class="shell-item s2">@skapetaapartments</a>
        <a href="https://wa.me/355693227207" target="_blank" class="shell-item s3">KONTAKTO NË WHATSAPP</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.1/browser/pixi.min.js"></script>

<script>
    const wrapper = document.getElementById('canvas-wrapper');
    const app = new PIXI.Application({
        width: window.innerWidth,
        height: window.innerHeight,
        resolution: window.devicePixelRatio || 1,
        autoResize: true,
        transparent: true
    });
    wrapper.appendChild(app.view);

    // Ngarkimi i imazhit tënd
    const texture = PIXI.Texture.from('f14f1baab6526414e64ccb137f95e974.jpg');
    const bg = new PIXI.Sprite(texture);
    
    bg.anchor.set(0.5);
    bg.x = app.screen.width / 2;
    bg.y = app.screen.height / 2;
    
    // Përshtatja e imazhit që të mbulojë ekranin (Cover effect)
    const ratio = Math.max(app.screen.width / bg.width, app.screen.height / bg.height);
    bg.scale.set(ratio);
    
    app.stage.addChild(bg);

    // KRIJIMI I DALLGËVE REALE (Displacement Map)
    // Përdorim një teksturë uji për të krijuar lëvizjen
    const displacementSprite = PIXI.Sprite.from('https://res.cloudinary.com/dg70sbebh/image/upload/v1582214708/displacement_map_repeat_v6yv9z.jpg');
    displacementSprite.texture.baseTexture.wrapMode = PIXI.WRAP_MODES.REPEAT;
    const displacementFilter = new PIXI.filters.DisplacementFilter(displacementSprite);
    
    // Filtri aplikohet vetëm te uji (pjesa e sipërme)
    app.stage.addChild(displacementSprite);
    bg.filters = [displacementFilter];

    displacementFilter.scale.x = 20;
    displacementFilter.scale.y = 20;

    // Animacioni i lëvizjes së ujit
    app.ticker.add(() => {
        displacementSprite.x += 0.4; // Shpejtësia e dallgëve
        displacementSprite.y += 0.2;
    });

    // INTERAKSIONI: Prekja e ujit krijohet valëzim (Ripple)
    window.addEventListener('pointerdown', () => {
        displacementFilter.scale.x = 60;
        displacementFilter.scale.y = 60;
        setTimeout(() => {
            displacementFilter.scale.x = 20;
            displacementFilter.scale.y = 20;
        }, 300);
    });

    // Resize
    window.addEventListener('resize', () => {
        app.renderer.resize(window.innerWidth, window.innerHeight);
        const newRatio = Math.max(app.screen.width / bg.width, app.screen.height / bg.height);
        bg.scale.set(newRatio);
        bg.x = app.screen.width / 2;
        bg.y = app.screen.height / 2;
    });
</script>

</body>
</html>
