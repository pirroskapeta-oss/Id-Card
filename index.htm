<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirro Skapeta</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
color:white;
font-family:sans-serif;
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* BUTTON START */
.start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px 30px;
border-radius:30px;
font-size:18px;
cursor:pointer;
z-index:10;
}

/* TEXT */
.container{
position:absolute;
top:15%;
width:100%;
text-align:center;
}

.shells{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

.shell{
width:80px;
height:80px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="start" onclick="startVideo()">Kliko për të hyrë</div>

<video id="vid" loop muted playsinline>
<source src="https://cdn.coverr.co/videos/coverr-waves-hitting-the-shore-1602/1080p.mp4" type="video/mp4">
</video>

<div class="container">
<h1>Pirro Skapeta</h1>
<p>+355692033673</p>
</div>

<div class="shells">
<div class="shell" onclick="openLink('https://instagram.com/pirro_skapeta')">IG</div>
<div class="shell" onclick="openLink('https://instagram.com/skapetaapartments')">Biz</div>
<div class="shell" onclick="openLink('https://wa.me/355693227207')">WA</div>
</div>

<script>
function startVideo(){
let v=document.getElementById("vid");
v.play();
document.querySelector(".start").style.display="none";
}

function openLink(url){
window.open(url,"_blank");
}
</script>

</body>
</html>
