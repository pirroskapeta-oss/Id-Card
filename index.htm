<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirro Skapeta</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
}

/* BACKGROUND REAL */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
z-index:-2;
}

/* WAVE ANIMATION OVERLAY */
.wave{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at center, rgba(255,255,255,0.1), transparent);
animation:move 8s linear infinite;
z-index:-1;
}

@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* TEXT */
.container{
position:absolute;
top:15%;
width:100%;
text-align:center;
}

h1{
font-size:50px;
text-shadow:0 0 20px black;
}

p{
opacity:0.9;
}

/* SHELL BUTTONS */
.shells{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.shell{
width:100px;
height:100px;
border-radius:60% 60% 40% 40%;
background:radial-gradient(circle,#fff,#caa27c);
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.shell:hover{
transform:scale(1.2) rotate(5deg);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="wave"></div>

<div class="container">
<h1>Pirro Skapeta</h1>
<p>+355 692033673</p>
<p>Owner of Skapeta Apartments</p>
</div>

<div class="shells">
<div class="shell" onclick="openLink('https://instagram.com/pirro_skapeta')">@pirro_skapeta</div>
<div class="shell" onclick="openLink('https://instagram.com/skapetaapartments')">@skapetaapartments</div>
<div class="shell" onclick="openLink('https://wa.me/355693227207')">WhatsApp</div>
</div>

<script>
function openLink(url){
window.open(url,"_blank");
}
</script>

</body>
</html>
