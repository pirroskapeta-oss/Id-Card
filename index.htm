<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000d1a">
<title>Pirro Skapeta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #000d1a;
  touch-action: none;
}

#ocean-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  display: block;
}

/* ---- PROFILE CARD ---- */
#profile-card {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  padding-top: max(5vh, 28px);
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}

.profile-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.5rem, 5.5vw, 3rem);
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.18em;
  text-align: center;
  text-shadow:
    0 0 35px rgba(100, 200, 255, 0.75),
    0 0 70px rgba(60, 150, 220, 0.4),
    0 3px 18px rgba(0, 0, 0, 0.98);
}

.profile-divider {
  width: clamp(70px, 14vw, 130px);
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(150, 220, 255, 0.75), transparent);
  margin: 0.65em 0;
}

.profile-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.68rem, 2vw, 0.95rem);
  font-weight: 300;
  font-style: italic;
  color: rgba(175, 228, 255, 0.92);
  letter-spacing: 0.42em;
  text-transform: uppercase;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.95);
}

.profile-phone {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.65rem, 1.7vw, 0.85rem);
  color: rgba(155, 208, 238, 0.72);
  letter-spacing: 0.28em;
  margin-top: 0.45em;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.95);
}

/* ---- TOUCH HINT ---- */
#touch-hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.55rem, 1.4vw, 0.7rem);
  color: rgba(255, 255, 255, 0.2);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 5;
  animation: hintPulse 6s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
  white-space: nowrap;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0; }
  35%, 65% { opacity: 1; }
}

/* ---- SHELLS ---- */
#shells-container {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  height: 27vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 6vw, 52px);
  padding-bottom: max(2.5vh, 14px);
  z-index: 20;
}

.shell-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
}
.shell-link:hover  { transform: translateY(-13px) scale(1.14) rotate(-2deg); }
.shell-link:active { transform: translateY(-6px)  scale(1.07); }

.shell-icon {
  width:  clamp(60px, 12.5vw, 90px);
  height: clamp(60px, 12.5vw, 90px);
  filter:
    drop-shadow(0 6px 18px rgba(0,0,0,0.65))
    drop-shadow(0 0 22px rgba(120,210,255,0.35));
  transition: filter 0.3s ease;
}
.shell-link:hover .shell-icon {
  filter:
    drop-shadow(0 9px 26px rgba(0,0,0,0.75))
    drop-shadow(0 0 36px rgba(120,210,255,0.55));
}

.shell-icon-lg {
  width:  clamp(72px, 15vw, 108px);
  height: clamp(72px, 15vw, 108px);
}

.shell-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.58rem, 1.55vw, 0.7rem);
  color: rgba(255, 255, 255, 0.88);
  letter-spacing: 0.07em;
  text-align: center;
  text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,0.9);
  max-width: 110px;
  line-height: 1.35;
}

/* ---- LOADING ---- */
#loading {
  position: fixed;
  inset: 0;
  background: #000d1a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 1.1s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.loading-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  color: rgba(140, 215, 255, 0.6);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  animation: ldPulse 1.6s ease-in-out infinite;
}
@keyframes ldPulse { 0%,100%{opacity:0.35;} 50%{opacity:1;} }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function () {
  'use strict';

  var canvas = document.getElementById('ocean-canvas');

  var renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true,
    powerPreference: 'high-performance',
    alpha: false,
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000d1a);
  scene.fog = new THREE.FogExp2(0x000d1a, 0.0065);

  var camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 24, 48);
  camera.lookAt(0, 0, 0);

  /* ---- SKY ---- */
  var skyUniforms = { uTime: { value: 0 } };
  var skyMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(600, 220),
    new THREE.ShaderMaterial({
      uniforms: skyUniforms,
      vertexShader: [
        'varying vec2 vUv;',
        'void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }'
      ].join('\n'),
      fragmentShader: [
        'uniform float uTime;',
        'varying vec2 vUv;',
        'void main(){',
        '  vec3 top = vec3(0.003,0.013,0.055);',
        '  vec3 mid = vec3(0.005,0.038,0.110);',
        '  vec3 hor = vec3(0.018,0.110,0.260);',
        '  vec3 col = mix(hor,mid,smoothstep(0.0,0.32,vUv.y));',
        '  col = mix(col,top,smoothstep(0.32,1.0,vUv.y));',
        '  float mx = abs(vUv.x-0.5-sin(uTime*0.018)*0.04)*2.0;',
        '  col += exp(-mx*mx*28.0)*0.028*(1.0-vUv.y)*vec3(0.5,0.8,1.0);',
        '  gl_FragColor=vec4(col,1.0);',
        '}'
      ].join('\n'),
      depthWrite: false,
      side: THREE.DoubleSide,
    })
  );
  skyMesh.position.set(0, 22, -145);
  skyMesh.renderOrder = -2;
  scene.add(skyMesh);

  /* ---- MOON ---- */
  var moonMesh = new THREE.Mesh(
    new THREE.CircleGeometry(5.5, 32),
    new THREE.MeshBasicMaterial({ color: 0xeef8ff, transparent: true, opacity: 0.78 })
  );
  moonMesh.position.set(18, 48, -143);
  scene.add(moonMesh);

  var moonGlow = new THREE.Mesh(
    new THREE.CircleGeometry(14, 32),
    new THREE.MeshBasicMaterial({ color: 0x99ccff, transparent: true, opacity: 0.07 })
  );
  moonGlow.position.set(18, 48, -144);
  scene.add(moonGlow);

  /* ---- STARS ---- */
  var STAR_COUNT = 350;
  var starGeo = new THREE.BufferGeometry();
  var sArr = new Float32Array(STAR_COUNT * 3);
  for (var i = 0; i < STAR_COUNT; i++) {
    sArr[i*3]   = (Math.random()-0.5)*420;
    sArr[i*3+1] = 18 + Math.random()*90;
    sArr[i*3+2] = -55 - Math.random()*90;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(sArr, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.32, transparent: true, opacity: 0.72, sizeAttenuation: true
  })));

  /* ---- WATER ---- */
  var MAX_R = 10;
  var ripVec = [];
  for (var ri = 0; ri < MAX_R; ri++) ripVec.push(new THREE.Vector3(0, 0, -999));
  var ripHead = 0;

  var wUni = {
    uTime:       { value: 0 },
    uRipple:     { value: ripVec },
    uRippleCount:{ value: 0 },
  };

  var WVERT = [
    'uniform float uTime;',
    'uniform vec3 uRipple[' + MAX_R + '];',
    'uniform int uRippleCount;',
    '',
    'varying vec3 vPos;',
    'varying float vH;',
    'varying vec3 vN;',
    '',
    'float sw(vec2 p, float kx, float kz, float a, float sp, float ph) {',
    '  return a * sin(p.x*kx + p.y*kz + uTime*sp + ph);',
    '}',
    '',
    'float calcH(vec2 p) {',
    '  float h = 0.0;',
    '  h += sw(p,  0.060,  0.040, 2.00, 0.55, 0.0);',
    '  h += sw(p, -0.042,  0.068, 1.65, 0.48, 1.8);',
    '  h += sw(p,  0.052, -0.050, 1.35, 0.38, 3.5);',
    '  h += sw(p,  0.180,  0.080, 0.65, 1.10, 0.0);',
    '  h += sw(p, -0.105,  0.155, 0.55, 0.95, 2.1);',
    '  h += sw(p,  0.125, -0.120, 0.48, 0.85, 1.3);',
    '  h += sw(p, -0.220,  0.060, 0.40, 1.30, 4.0);',
    '  h += sw(p,  0.450,  0.200, 0.18, 2.20, 0.0);',
    '  h += sw(p, -0.300,  0.400, 0.14, 2.50, 1.5);',
    '  h += sw(p,  0.350, -0.350, 0.12, 1.90, 3.2);',
    '  return h;',
    '}',
    '',
    'void main() {',
    '  vec3 pos = position;',
    '  vec2 p = pos.xz;',
    '  float h = calcH(p);',
    '',
    '  // Big shore wave every 5s',
    '  float phase = mod(uTime * 0.2, 1.0);',
    '  float wZ = mix(-72.0, 42.0, phase);',
    '  float distW = pos.z - wZ;',
    '  float shoal = 1.0 + smoothstep(-72.0, 42.0, wZ) * 1.6;',
    '  float env = exp(-max(distW,0.0)*0.11) * exp(-max(-distW,0.0)*0.038);',
    '  float fio = smoothstep(0.0,0.07,phase) * smoothstep(1.0,0.93,phase);',
    '  h += env * 6.0 * shoal * fio;',
    '',
    '  // Click ripples',
    '  for(int i = 0; i < ' + MAX_R + '; i++) {',
    '    if(i >= uRippleCount) { break; }',
    '    float age = uTime - uRipple[i].z;',
    '    if(age >= 0.0 && age <= 6.5) {',
    '      float dx = pos.x - uRipple[i].x;',
    '      float dz = pos.z - uRipple[i].y;',
    '      float dist = sqrt(dx*dx + dz*dz);',
    '      float wf = dist - age * 7.2;',
    '      float amp = exp(-age*0.68) * 1.85;',
    '      float ring = exp(-wf*wf*0.38);',
    '      h += sin(wf * -1.15) * amp * ring;',
    '    }',
    '  }',
    '',
    '  pos.y = h;',
    '  vPos = pos;',
    '  vH = h;',
    '',
    '  float eps = 0.7;',
    '  float hR = calcH(p + vec2(eps, 0.0));',
    '  float hF = calcH(p + vec2(0.0, eps));',
    '  vN = normalize(vec3(h - hR, eps, h - hF));',
    '',
    '  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);',
    '}'
  ].join('\n');

  var WFRAG = [
    'uniform float uTime;',
    'varying vec3 vPos;',
    'varying float vH;',
    'varying vec3 vN;',
    '',
    'void main() {',
    '  vec3 deepC  = vec3(0.004, 0.055, 0.195);',
    '  vec3 midC   = vec3(0.010, 0.175, 0.420);',
    '  vec3 crestC = vec3(0.200, 0.625, 0.860);',
    '  vec3 foamC  = vec3(0.880, 0.960, 1.000);',
    '',
    '  float hN = clamp((vH + 2.5) / 6.5, 0.0, 1.0);',
    '  vec3 col = mix(deepC, midC, hN);',
    '  col = mix(col, crestC, smoothstep(1.8,3.2,vH)*0.72);',
    '  col = mix(col, foamC,  smoothstep(3.0,5.8,vH)*0.88);',
    '',
    '  // Specular (moon)',
    '  vec3 lDir = normalize(vec3(-0.30, 0.70, -0.50));',
    '  vec3 vDir = normalize(vec3(0.0, 24.0, 48.0) - vPos);',
    '  vec3 hVec = normalize(lDir + vDir);',
    '  float spec = pow(max(dot(vN, hVec), 0.0), 115.0);',
    '  col += spec * vec3(0.88, 0.97, 1.00) * 1.25;',
    '',
    '  // Moon reflection streak',
    '  float mX = abs(vPos.x - 18.0*(1.0 - vPos.z/52.0));',
    '  col += exp(-mX*mX*0.07)*exp(-abs(vPos.z+8.0)*0.014)*vec3(0.55,0.82,1.0)*0.28;',
    '',
    '  // Sparkle',
    '  float sp = fract(sin(dot(floor(vPos.xz*4.2),vec2(127.1,311.7)))*43758.5);',
    '  float sp2= fract(sin(dot(floor(vPos.xz*4.2+1.0),vec2(269.5,183.3)))*43758.5);',
    '  col += step(0.977,sp)*step(0.5,sp2)*0.72*step(0.45,hN);',
    '',
    '  float alpha = 0.90 + smoothstep(3.0,5.8,vH)*0.10;',
    '  gl_FragColor = vec4(col, alpha);',
    '}'
  ].join('\n');

  var wGeo = new THREE.PlaneGeometry(230, 170, 280, 240);
  wGeo.rotateX(-Math.PI / 2);
  var waterMesh = new THREE.Mesh(wGeo, new THREE.ShaderMaterial({
    uniforms: wUni,
    vertexShader: WVERT,
    fragmentShader: WFRAG,
    transparent: true,
  }));
  scene.add(waterMesh);

  /* ---- SAND ---- */
  var sandGeo = new THREE.PlaneGeometry(230, 55, 90, 22);
  sandGeo.rotateX(-Math.PI / 2);
  var sPosAttr = sandGeo.attributes.position;
  for (var si = 0; si < sPosAttr.count; si++) {
    var sx = sPosAttr.getX(si), sz = sPosAttr.getZ(si);
    sPosAttr.setY(si, -0.58 + Math.sin(sx*0.23)*0.09 + Math.cos(sz*0.37)*0.07);
  }
  sPosAttr.needsUpdate = true;
  sandGeo.computeVertexNormals();

  var sandUni = { uTime: { value: 0 } };
  var sandMesh = new THREE.Mesh(sandGeo, new THREE.ShaderMaterial({
    uniforms: sandUni,
    vertexShader: [
      'varying vec2 vUv; varying vec3 vWP;',
      'void main(){ vUv=uv; vWP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'uniform float uTime;',
      'varying vec2 vUv; varying vec3 vWP;',
      'float h2(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }',
      'void main(){',
      '  float n  = h2(floor(vWP.xz*5.5));',
      '  float n2 = h2(floor(vWP.xz*1.8));',
      '  vec3 dry  = vec3(0.84,0.73,0.49);',
      '  vec3 dry2 = vec3(0.76,0.64,0.41);',
      '  vec3 wet  = vec3(0.50,0.44,0.29);',
      '  float w = smoothstep(0.48,0.0,vUv.x);',
      '  float wash = smoothstep(0.24,0.3,vUv.x)*(0.5+0.5*sin(uTime*0.75+vWP.x*0.28));',
      '  vec3 col = mix(dry2,dry,n*0.55+n2*0.45);',
      '  col = mix(col,wet,w*0.85);',
      '  col += wash*0.075*vec3(0.80,0.90,1.00);',
      '  col += step(0.987,h2(vWP.xz*2.8))*w*0.18*vec3(0.88,0.94,1.00);',
      '  gl_FragColor=vec4(col,1.0);',
      '}'
    ].join('\n'),
  }));
  sandMesh.position.set(0, 0, 57);
  scene.add(sandMesh);

  /* ---- FOAM PARTICLES ---- */
  var PC = 280;
  var pGeo = new THREE.BufferGeometry();
  var pArr = new Float32Array(PC*3);
  var pVel = new Float32Array(PC*2);
  for (var pi = 0; pi < PC; pi++) {
    pArr[pi*3]   = (Math.random()-0.5)*210;
    pArr[pi*3+1] = Math.random()*4;
    pArr[pi*3+2] = (Math.random()*0.8-0.5)*145;
    pVel[pi*2]   = (Math.random()-0.5)*0.28;
    pVel[pi*2+1] = (Math.random()-0.5)*0.18;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
  var pMesh = new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0xddeeff, size: 0.2, transparent: true, opacity: 0.3, sizeAttenuation: true
  }));
  scene.add(pMesh);

  /* ---- LIGHTS ---- */
  scene.add(new THREE.AmbientLight(0x001e40, 3.2));
  var mLight = new THREE.DirectionalLight(0x8ec8ff, 2.6);
  mLight.position.set(-18, 40, -42);
  scene.add(mLight);

  /* ---- CLICK/TOUCH RIPPLE ---- */
  var hitPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  var raycaster = new THREE.Raycaster();
  var mouse2 = new THREE.Vector2();

  function spawnRipple(cx, cy) {
    if (cy > window.innerHeight * 0.74) return;
    mouse2.x =  (cx / window.innerWidth)  * 2 - 1;
    mouse2.y = -(cy / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse2, camera);
    var hit = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(hitPlane, hit)) {
      var idx = ripHead % MAX_R;
      ripVec[idx].set(hit.x, hit.z, wUni.uTime.value);
      ripHead++;
      wUni.uRippleCount.value = Math.min(ripHead, MAX_R);
    }
  }

  canvas.addEventListener('mousedown', function(e) { spawnRipple(e.clientX, e.clientY); });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    for (var ti = 0; ti < e.touches.length; ti++) spawnRipple(e.touches[ti].clientX, e.touches[ti].clientY);
  }, { passive: false });

  /* ---- RESIZE ---- */
  window.addEventListener('resize', function() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  /* ---- ANIMATE ---- */
  var startT = null, prevT = 0;

  function tick(now) {
    requestAnimationFrame(tick);
    if (!startT) startT = now;
    var t  = (now - startT) * 0.001;
    var dt = Math.min(t - prevT, 0.05);
    prevT = t;

    wUni.uTime.value       = t;
    skyUniforms.uTime.value = t;
    sandUni.uTime.value    = t;

    camera.position.x = Math.sin(t * 0.075) * 1.9;
    camera.position.y = 24 + Math.sin(t * 0.11) * 0.65;
    camera.lookAt(Math.sin(t * 0.058)*1.6, 0, 0);

    var pA = pGeo.attributes.position.array;
    for (var i = 0; i < PC; i++) {
      pA[i*3]   += dt * pVel[i*2] * 0.75;
      pA[i*3+1] += dt * 0.22;
      pA[i*3+2] += dt * 0.14;
      if (pA[i*3+1] > 5 || pA[i*3+2] > 52) {
        pA[i*3]   = (Math.random()-0.5)*210;
        pA[i*3+1] = 0;
        pA[i*3+2] = -72 + Math.random()*28;
      }
    }
    pGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }

  requestAnimationFrame(tick);

  function hideLoader() {
    var l = document.getElementById('loading');
    if (l) { l.classList.add('hidden'); setTimeout(function(){ if(l.parentNode) l.parentNode.removeChild(l); }, 1200); }
  }
  window.addEventListener('load', function(){ setTimeout(hideLoader, 700); });
  setTimeout(hideLoader, 2200);

})();
</script>
</body>
</html>
