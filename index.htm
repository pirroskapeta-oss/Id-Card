<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirro Skapeta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Playfair Display', serif;
      position: relative;
    }

    /* Yjet që lëvizin nga majtas-lart → djathtas-poshtë */
    .stars {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 6px white;
    }

    /* Emri me neon jeshil të hollë */
    .name {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.4rem;
      letter-spacing: 6px;
      color: #ffffff;
      text-shadow: 
        0 0 10px #00ff9d,
        0 0 20px #00ff9d,
        0 0 40px #00ff9d;
      z-index: 10;
      white-space: nowrap;
    }

    /* UFO me levizje spirale */
    .ufo {
      position: absolute;
      font-size: 3rem;
      z-index: 5;
      filter: drop-shadow(0 0 25px #00ffcc);
      animation: ufoSpiral 28s linear infinite;
    }

    @keyframes ufoSpiral {
      0%   { transform: translate(-120px, 90vh) rotate(-20deg); }
      25%  { transform: translate(80px, 50vh) rotate(10deg); }
      50%  { transform: translate(180px, 30vh) rotate(-15deg); }
      75%  { transform: translate(100px, 10vh) rotate(20deg); }
      100% { transform: translate(300px, -80px) rotate(-10deg); }
    }

    /* Butonat e vegjël në të djathtë poshtë */
    .buttons {
      position: absolute;
      bottom: 12%;
      right: 8%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .btn {
      width: 48px;
      height: 48px;
      background: rgba(0, 255, 150, 0.15);
      border: 2px solid #00ff9d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #00ff9d;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 255, 150, 0.4);
    }

    .btn:hover {
      transform: scale(1.25);
      background: rgba(0, 255, 150, 0.3);
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <!-- Emri -->
  <h1 class="name">Pirro Skapeta</h1>

  <!-- UFO -->
  <div class="ufo">🛸</div>

  <!-- Butonat poshtë djathtas (të vegjël) -->
  <div class="buttons">
    <div class="btn" onclick="window.open('https://instagram.com/pirro_skapeta', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://instagram.com/skapetaapartments', '_blank')">📷</div>
    <div class="btn" onclick="window.open('https://wa.me/355693227207', '_blank')">💬</div>
  </div>

  <script>
    // Krijo 400 yje që lëvizin
    function createMovingStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 400; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        
        const size = Math.random() * 2.5 + 0.8;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        
        // Kohë e ndryshme për secilin yll
        const duration = Math.random() * 35 + 25;
        star.style.animation = `moveStar ${duration}s linear infinite`;
        
        star.style.opacity = Math.random() * 0.7 + 0.4;
        
        container.appendChild(star);
      }
    }

    // Animacioni i yjeve që lëvizin diagonal
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes moveStar {
        from { transform: translate(0, 0); }
        to   { transform: translate(120vw, -120vh); }
      }
    `;
    document.head.appendChild(style);

    createMovingStars();
  </script>

</body>
</html>
